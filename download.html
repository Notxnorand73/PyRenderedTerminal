<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download PRT</title>
<style>
body {
    font-family: 'Courier New', monospace;
    background-color: #1e3a8a; /* deep Python blue */
    color: #facc15; /* bright Python yellow */
    margin: 0;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Floating hero character */
.hero {
    font-weight: bold;
    color: #facc15; /* bright yellow */
    display: inline-block;
    animation: float 1s ease-in-out infinite alternate;
    font-size: 2rem;
    margin-left: 4px;
}
@keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-8px); }
}

.box {
    border-left: 5px solid #0095ff; /* cyan highlight */
    border-radius: 15px;
    padding: 1.5rem;
    margin: 1rem 0;
    max-width: 700px;
    width: 90%;
    box-shadow: 3px 3px 15px rgba(0,0,0,0.4);
    color: #f0f9ff;
}

.box:nth-child(1) { background-color: rgba(30, 58, 138, 0.9); }
.box:nth-child(2) { background-color: rgba(50, 100, 200, 0.85); }
.box:nth-child(3) { background-color: rgba(70, 130, 250, 0.85); }

h1 { font-size: 3rem; text-align:center; margin-bottom:0.5rem; }
p { font-size:1.2rem; line-height:1.5; text-align:center; }
pre { background:#0b3a91; padding:1rem; border-radius:10px; overflow:auto; color:#00ffff; }

.button {
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    border: none;
    background-color: #1e3a8a;
    color: #00ffff;
    cursor: pointer;
    font-size: 1rem;
    margin: 0.5rem;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.2s, background-color 0.2s;
}
.button:hover {
    background-color: #33ffff;
    transform: scale(1.05);
}

nav { margin-top: 1rem; text-align:center; }
</style>
</head>
<body>

<div class="box">
    <h1>Download PRT <span class="hero">@</span></h1>
    <p>You can install PRT for Python using pip:</p>
    <pre>pip install git+https://github.com/Notxnorand73/prt</pre>
</div>

<div class="box">
    <ul>
        <li>Open <a href="index.html" style="color:#00ffff;">PRT Introduction</a></li>
        <li>Read the documentation</li>
        <li>Try coding your own mini terminal games!</li>
    </ul>
</div>

<div class="box">
    <nav>
        <a href="index.html" class="button"><strong>Back to Introduction</strong></a>
        <a href="docs.html" class="button"><strong>Documentation</strong></a>
    </nav>
</div>

</body>
</html>
